version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    AWS_ACCOUNT_ID: "654654306411"
    ECR_REPO_NAME: churn-inference
    MCP_ECR_REPO_NAME: churn-mcp
    S3_BUCKET: churn-prod-artifacts-yuva2004
    S3_DATA_BUCKET: churn-prod-data-yuva2004

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO_NAME
      - MCP_IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$MCP_ECR_REPO_NAME
      - mkdir -p models data/raw
      - aws s3 cp s3://$S3_BUCKET/models/v1/xgb_pipeline.pkl models/xgb_pipeline.pkl
      - aws s3 cp s3://$S3_BUCKET/models/v1/xgboost_churn.pkl models/xgboost_churn.pkl
      - aws s3 cp s3://$S3_BUCKET/models/v1/encoders.pkl models/encoders.pkl
      - aws s3 cp s3://$S3_BUCKET/models/v1/feature_names_35.pkl models/feature_names_35.pkl
      - aws s3 cp s3://$S3_BUCKET/models/v1/feature_names_36.pkl models/feature_names_36.pkl
      - aws s3 cp s3://$S3_BUCKET/models/v1/threshold.pkl models/threshold.pkl
      - aws s3 cp s3://$S3_BUCKET/models/v1/shap_explainer.pkl models/shap_explainer.pkl
      - aws s3 cp s3://$S3_BUCKET/models/v1/shap_values_test.csv models/shap_values_test.csv
      - aws s3 cp s3://$S3_DATA_BUCKET/raw/telco.csv data/raw/telco.csv
      - INFERENCE_CURRENT=$(aws lambda get-alias --function-name churn-inference --name prod --query FunctionVersion --output text --region $AWS_DEFAULT_REGION)
      - WARROOM_CURRENT=$(aws lambda get-alias --function-name churn-warroom --name prod --query FunctionVersion --output text --region $AWS_DEFAULT_REGION)
      - MCP_CURRENT=$(aws lambda get-alias --function-name churn-mcp-tools --name prod --query FunctionVersion --output text --region $AWS_DEFAULT_REGION)

  build:
    commands:
      - docker build --platform linux/amd64 --provenance=false -f docker/lambda.Dockerfile -t $ECR_REPO_NAME:$COMMIT_HASH .
      - docker tag $ECR_REPO_NAME:$COMMIT_HASH $IMAGE_URI:$COMMIT_HASH
      - docker build --platform linux/amd64 --provenance=false -f docker/mcp_lambda.Dockerfile -t $MCP_ECR_REPO_NAME:$COMMIT_HASH .
      - docker tag $MCP_ECR_REPO_NAME:$COMMIT_HASH $MCP_IMAGE_URI:$COMMIT_HASH

  post_build:
    commands:
      - docker push $IMAGE_URI:$COMMIT_HASH
      - docker push $MCP_IMAGE_URI:$COMMIT_HASH
      - aws lambda update-function-code --function-name churn-inference --image-uri $IMAGE_URI:$COMMIT_HASH --region $AWS_DEFAULT_REGION
      - aws lambda update-function-code --function-name churn-warroom --image-uri $IMAGE_URI:$COMMIT_HASH --region $AWS_DEFAULT_REGION
      - aws lambda update-function-code --function-name churn-mcp-tools --image-uri $MCP_IMAGE_URI:$COMMIT_HASH --region $AWS_DEFAULT_REGION
      - aws lambda wait function-updated --function-name churn-inference --region $AWS_DEFAULT_REGION
      - aws lambda wait function-updated --function-name churn-warroom --region $AWS_DEFAULT_REGION
      - aws lambda wait function-updated --function-name churn-mcp-tools --region $AWS_DEFAULT_REGION
      - INFERENCE_NEW=$(aws lambda publish-version --function-name churn-inference --region $AWS_DEFAULT_REGION --query Version --output text)
      - WARROOM_NEW=$(aws lambda publish-version --function-name churn-warroom --region $AWS_DEFAULT_REGION --query Version --output text)
      - MCP_NEW=$(aws lambda publish-version --function-name churn-mcp-tools --region $AWS_DEFAULT_REGION --query Version --output text)
      - "printf 'version: 0.0\\nResources:\\n  - ChurnInference:\\n      Type: AWS::Lambda::Function\\n      Properties:\\n        Name: churn-inference\\n        Alias: prod\\n        CurrentVersion: %s\\n        TargetVersion: %s\\n' $INFERENCE_CURRENT $INFERENCE_NEW > appspec-inference.yml"
      - "printf 'version: 0.0\\nResources:\\n  - ChurnWarroom:\\n      Type: AWS::Lambda::Function\\n      Properties:\\n        Name: churn-warroom\\n        Alias: prod\\n        CurrentVersion: %s\\n        TargetVersion: %s\\n' $WARROOM_CURRENT $WARROOM_NEW > appspec-warroom.yml"
      - "printf 'version: 0.0\\nResources:\\n  - ChurnMcp:\\n      Type: AWS::Lambda::Function\\n      Properties:\\n        Name: churn-mcp-tools\\n        Alias: prod\\n        CurrentVersion: %s\\n        TargetVersion: %s\\n' $MCP_CURRENT $MCP_NEW > appspec-mcp.yml"
      - cp appspec-inference.yml appspec.yml

artifacts:
  files:
    - appspec.yml
    - appspec-inference.yml
    - appspec-warroom.yml
    - appspec-mcp.yml